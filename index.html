<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Happy Birthday Jannu ❤️</title>

<link rel="stylesheet" href="file/default.css">

<script src="file/jquery.min.js"></script>
<script src="file/jscex.min.js"></script>
<script src="file/jscex-parser.js"></script>
<script src="file/jscex-jit.js"></script>
<script src="file/jscex-builderbase.min.js"></script>
<script src="file/jscex-async.min.js"></script>
<script src="file/jscex-async-powerpack.min.js"></script>
<script src="file/functions.js"></script>
<script src="file/love.js"></script>

<style>

body{
margin:0;
background:linear-gradient(135deg,#ff6a88,#ff99ac);
font-family:sans-serif;
color:white;
text-align:center;
overflow:hidden;
}

/* star sky */

.star{
position:fixed;
width:2px;
height:2px;
background:white;
animation:twinkle 3s infinite;
}

@keyframes twinkle{
0%{opacity:0}
50%{opacity:1}
100%{opacity:0}
}

/* start button */

#startBtn{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
padding:20px 40px;
font-size:22px;
background:#ff4d6d;
border:none;
color:white;
border-radius:10px;
cursor:pointer;
z-index:9999;
}

/* glowing title */

#glowTitle{
font-size:44px;
opacity:0;
text-shadow:0 0 10px #fff,0 0 20px #ff8fb1,0 0 40px #ff4d6d;
transition:1s;
}

/* photo */

.photo{
width:180px;
height:180px;
margin:auto;
border-radius:50%;
overflow:hidden;
border:6px solid white;
animation:beat 1.2s infinite;
}

.photo img{
width:100%;
height:100%;
object-fit:cover;
}

@keyframes beat{
0%{transform:scale(1)}
50%{transform:scale(1.15)}
100%{transform:scale(1)}
}

/* slideshow */

.slideshow{
width:260px;
height:320px;
margin:auto;
position:relative;
}

.slide{
width:100%;
height:100%;
position:absolute;
object-fit:cover;
border-radius:10px;
opacity:0;
transition:1s;
}

.slide.active{
opacity:1;
}

/* petals */

.petal{
position:fixed;
top:-20px;
font-size:20px;
animation:fall linear infinite;
}

@keyframes fall{
to{
transform:translateY(100vh) rotate(360deg);
}
}

/* fireworks */

@keyframes explode{
0%{transform:scale(1);opacity:1}
100%{transform:scale(15);opacity:0}
}

/* cake */

.cake{
font-size:50px;
}

/* canvas tree */

#canvas{
position:absolute;
top:0;
left:0;
z-index:-1;
}

#message{
width:80%;
margin:auto;
font-size:18px;
line-height:1.6;
}

</style>
</head>

<body>

<button id="startBtn">Tap for your birthday surprise ❤️</button>

<audio id="music" loop>
<source src="aud.mp3">
</audio>

<h1 id="glowTitle">🎉 Happy Birthday Jannu ❤️</h1>

<div class="photo">
<img src="jannu1.jpg">
</div>

<div id="message"></div>

<div class="cake">🎂</div>

<div class="slideshow">

<img class="slide" src="jannu1.jpg">
<img class="slide" src="jannu2.jpg">
<img class="slide" src="jannu3.jpg">
<img class="slide" src="jannu4.jpg">
<img class="slide" src="jannu5.jpg">
<img class="slide" src="jannu6.jpg">

</div>

<div id="timer"></div>

<canvas id="canvas" width="1100" height="680"></canvas>

<script>

/* star sky */

for(let i=0;i<200;i++){

let star=document.createElement("div");

star.className="star";

star.style.left=Math.random()*100+"vw";
star.style.top=Math.random()*100+"vh";
star.style.animationDuration=(2+Math.random()*3)+"s";

document.body.appendChild(star);

}

/* start button */

document.getElementById("startBtn").onclick=function(){

document.getElementById("music").play();

fireworks(40);

this.style.display="none";

};

/* fireworks */

function fireworks(n){

for(let i=0;i<n;i++){

let fire=document.createElement("div");

fire.style.position="fixed";
fire.style.width="6px";
fire.style.height="6px";
fire.style.background=`hsl(${Math.random()*360},100%,60%)`;
fire.style.left=Math.random()*100+"vw";
fire.style.top=Math.random()*100+"vh";
fire.style.borderRadius="50%";
fire.style.animation="explode 1s ease-out forwards";

document.body.appendChild(fire);

setTimeout(()=>fire.remove(),1000);

}

}

/* slideshow */

let slides=document.querySelectorAll(".slide");
let index=0;

function showSlides(){

slides.forEach(s=>s.classList.remove("active"));

slides[index].classList.add("active");

index++;

if(index>=slides.length) index=0;

}

showSlides();

setInterval(showSlides,3000);

/* petals */

setInterval(()=>{

let petal=document.createElement("div");

petal.className="petal";
petal.innerHTML="🌸";
petal.style.left=Math.random()*100+"vw";
petal.style.animationDuration=(5+Math.random()*5)+"s";

document.body.appendChild(petal);

setTimeout(()=>petal.remove(),10000);

},400);

/* timer */

const birthDate=new Date("March 12, 1998").getTime();

function updateTimer(){

const now=new Date().getTime();

const diff=now-birthDate;

const days=Math.floor(diff/(1000*60*60*24));
const hours=Math.floor((diff%(1000*60*60*24))/(1000*60*60));
const minutes=Math.floor((diff%(1000*60*60))/(1000*60));
const seconds=Math.floor((diff%(1000*60))/1000);

document.getElementById("timer").innerHTML=
"❤️ Jannu has been making the world beautiful for<br>"+
days+" days "+hours+" hours "+minutes+" minutes "+seconds+" seconds";

}

setInterval(updateTimer,1000);

/* typing message */

const text=`Happy Birthday Jannu ❤️

Out of all the people in this world, I’m really thankful that life crossed our paths. You don’t even realize how much your presence means to me. Somehow, the smallest moments with you have become some of the most special ones in my life.

I just hope today reminds you how truly amazing you are. Stay the same beautiful soul, Jannu.`;

let i=0;

function typing(){

if(i<text.length){

document.getElementById("message").innerHTML+=text.charAt(i);

i++;

setTimeout(typing,35);

}

}

typing();

/* when tree finishes bloom */

setTimeout(function(){

fireworks(80);

document.getElementById("glowTitle").style.opacity=1;

},9000);

</script>

</body>
</html>
