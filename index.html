<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Jannu ❤️</title>

<link rel="stylesheet" href="file/default.css">

<script src="file/jquery.min.js"></script>
<script src="file/jscex.min.js"></script>
<script src="file/jscex-parser.js"></script>
<script src="file/jscex-jit.js"></script>
<script src="file/jscex-builderbase.min.js"></script>
<script src="file/jscex-async.min.js"></script>
<script src="file/jscex-async-powerpack.min.js"></script>
<script src="file/functions.js"></script>
<script src="file/love.js"></script>

<style>

body{
margin:0;
background:black;
color:white;
text-align:center;
font-family:Arial, sans-serif;
overflow:hidden;
}

/* START BUTTON */

#startBtn{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
padding:20px 40px;
font-size:22px;
background:#ff4d6d;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
z-index:9999;
}

/* HEART PHOTO */

.heart-photo{
position:absolute;
top:20px;
right:40px;
width:180px;
height:180px;
animation:beat 1.3s infinite;
}

.heart-photo img{
width:100%;
border-radius:50%;
border:5px solid white;
}

@keyframes beat{
0%{transform:scale(1)}
50%{transform:scale(1.2)}
100%{transform:scale(1)}
}

/* SLIDESHOW */

.slideshow{
position:absolute;
bottom:40px;
left:50%;
transform:translateX(-50%);
width:260px;
height:320px;
}

.slide{
width:100%;
height:100%;
object-fit:cover;
border-radius:12px;
position:absolute;
opacity:0;
transition:opacity 1s;
}

.slide.active{
opacity:1;
}

/* PETALS */

.petal{
position:fixed;
top:-20px;
font-size:22px;
animation:fall linear infinite;
}

@keyframes fall{
to{
transform:translateY(100vh) rotate(360deg);
}
}

/* FIREWORKS */

@keyframes explode{
0%{transform:scale(1);opacity:1}
100%{transform:scale(15);opacity:0}
}

/* TIMER */

#birthdayTimer{
position:absolute;
top:20px;
left:40px;
font-size:18px;
color:#ffccd5;
}

</style>

</head>

<body>

<button id="startBtn">Tap for your birthday surprise ❤️</button>

<audio id="music" loop>
<source src="aud.mp3">
</audio>

<div id="birthdayTimer"></div>

<div class="heart-photo">
<img src="jannu1.jpg">
</div>

<div class="slideshow">

<img class="slide" src="jannu1.jpg">
<img class="slide" src="jannu2.jpg">
<img class="slide" src="jannu3.jpg">
<img class="slide" src="jannu4.jpg">
<img class="slide" src="jannu5.jpg">
<img class="slide" src="jannu6.jpg">

</div>

<canvas id="canvas" width="1100" height="680"></canvas>

<script>

/* START BUTTON */

document.getElementById("startBtn").onclick=function(){

document.getElementById("music").play();

fireworks();

this.style.display="none";

};

/* FIREWORKS */

function fireworks(){

for(let i=0;i<40;i++){

let fire=document.createElement("div");

fire.style.position="fixed";
fire.style.width="6px";
fire.style.height="6px";
fire.style.background=`hsl(${Math.random()*360},100%,60%)`;
fire.style.left=Math.random()*100+"vw";
fire.style.top=Math.random()*100+"vh";
fire.style.borderRadius="50%";
fire.style.animation="explode 1s ease-out forwards";

document.body.appendChild(fire);

setTimeout(()=>fire.remove(),1000);

}

}

/* SLIDESHOW */

let slides=document.querySelectorAll(".slide");
let index=0;

function showSlides(){

slides.forEach(s=>s.classList.remove("active"));

slides[index].classList.add("active");

index++;

if(index>=slides.length) index=0;

}

showSlides();
setInterval(showSlides,3000);

/* FALLING PETALS */

setInterval(()=>{

let petal=document.createElement("div");

petal.className="petal";
petal.innerHTML="🌸";
petal.style.left=Math.random()*100+"vw";
petal.style.animationDuration=(5+Math.random()*5)+"s";

document.body.appendChild(petal);

setTimeout(()=>petal.remove(),10000);

},400);

/* BIRTHDAY TIMER */

const birthDate = new Date("March 12, 1998 00:00:00").getTime();

function updateBirthdayTimer(){

const now = new Date().getTime();
const diff = now - birthDate;

const days = Math.floor(diff/(1000*60*60*24));
const hours = Math.floor((diff%(1000*60*60*24))/(1000*60*60));
const minutes = Math.floor((diff%(1000*60*60))/(1000*60));
const seconds = Math.floor((diff%(1000*60))/1000);

document.getElementById("birthdayTimer").innerHTML =
"❤️ Jannu has been making the world beautiful for<br>" +
days+" days "+hours+" hours "+minutes+" minutes "+seconds+" seconds";

}

setInterval(updateBirthdayTimer,1000);

</script>

</body>
</html>
