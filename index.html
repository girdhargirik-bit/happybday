<!DOCTYPE html>
<html>
<head>

<meta charset="utf-8">
<title>Happy Birthday Jannu ❤️</title>

<style>

body{
margin:0;
background:linear-gradient(135deg,#ff6a88,#ff99ac);
font-family:Arial;
color:white;
text-align:center;
overflow-x:hidden;
}

/* INTRO SCREEN */

#intro{
position:fixed;
width:100%;
height:100%;
background:#ff6a88;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:9999;
}

#openBtn{
padding:20px 40px;
font-size:22px;
background:white;
color:#ff4d6d;
border:none;
border-radius:10px;
cursor:pointer;
}

/* CONTAINER */

.container{
max-width:700px;
margin:auto;
padding-top:40px;
}

/* TITLE */

#glowTitle{
font-size:42px;
margin-bottom:20px;
opacity:0;
text-shadow:0 0 10px white,0 0 20px #ff8fb1,0 0 40px #ff4d6d;
}

/* PHOTO */

.photo{
width:180px;
height:180px;
border-radius:50%;
overflow:hidden;
margin:20px auto;
border:6px solid white;
animation:beat 1.2s infinite;
}

.photo img{
width:100%;
height:100%;
object-fit:cover;
}

@keyframes beat{
0%{transform:scale(1)}
50%{transform:scale(1.12)}
100%{transform:scale(1)}
}

/* MESSAGE */

#message{
max-width:600px;
margin:auto;
font-size:18px;
line-height:1.7;
padding:0 20px;
}

/* CAKE */

.cake{
font-size:50px;
margin:20px 0;
}

/* SLIDESHOW */

.slideshow{
width:260px;
height:320px;
margin:30px auto;
position:relative;
}

.slide{
width:100%;
height:100%;
position:absolute;
object-fit:cover;
border-radius:12px;
opacity:0;
transition:1s;
}

.slide.active{
opacity:1;
}

/* TIMER */

#timer{
margin-top:20px;
font-size:18px;
}

/* PETALS */

.petal{
position:fixed;
top:-20px;
font-size:20px;
animation:fall linear infinite;
}

@keyframes fall{
to{
transform:translateY(100vh) rotate(360deg);
}
}

/* STAR SKY */

.star{
position:fixed;
width:2px;
height:2px;
background:white;
animation:twinkle 3s infinite;
}

@keyframes twinkle{
0%{opacity:0}
50%{opacity:1}
100%{opacity:0}
}

/* FIREWORK */

@keyframes explode{
0%{transform:scale(1);opacity:1}
100%{transform:scale(15);opacity:0}
}

</style>

</head>

<body>

<div id="intro">

<h2>Tap to open your birthday surprise ❤️</h2>

<button id="openBtn">Open</button>

</div>

<audio id="music" loop>
<source src="aud.mp3">
</audio>

<div class="container">

<h1 id="glowTitle">🎉 Happy Birthday Jannu ❤️</h1>

<div class="photo">
<img src="jannu1.jpg">
</div>

<div id="message"></div>

<div class="cake">🎂</div>

<div class="slideshow">

<img class="slide" src="jannu1.jpg">
<img class="slide" src="jannu2.jpg">
<img class="slide" src="jannu3.jpg">
<img class="slide" src="jannu4.jpg">
<img class="slide" src="jannu5.jpg">
<img class="slide" src="jannu6.jpg">

</div>

<div id="timer"></div>

</div>

<script>

/* STAR SKY */

for(let i=0;i<200;i++){

let star=document.createElement("div");
star.className="star";

star.style.left=Math.random()*100+"vw";
star.style.top=Math.random()*100+"vh";
star.style.animationDuration=(2+Math.random()*3)+"s";

document.body.appendChild(star);

}

/* INTRO */

document.getElementById("openBtn").onclick=function(){

document.getElementById("intro").style.display="none";

document.getElementById("music").play();

setTimeout(function(){

fireworks(60);

document.getElementById("glowTitle").style.opacity=1;

},2000);

};

/* FIREWORK */

function fireworks(n){

for(let i=0;i<n;i++){

let fire=document.createElement("div");

fire.style.position="fixed";
fire.style.width="6px";
fire.style.height="6px";
fire.style.background=`hsl(${Math.random()*360},100%,60%)`;
fire.style.left=Math.random()*100+"vw";
fire.style.top=Math.random()*100+"vh";
fire.style.borderRadius="50%";
fire.style.animation="explode 1s ease-out forwards";

document.body.appendChild(fire);

setTimeout(()=>fire.remove(),1000);

}

}

/* SLIDESHOW */

let slides=document.querySelectorAll(".slide");
let index=0;

function showSlides(){

slides.forEach(s=>s.classList.remove("active"));

slides[index].classList.add("active");

index++;

if(index>=slides.length) index=0;

}

showSlides();

setInterval(showSlides,3000);

/* PETALS */

setInterval(()=>{

let petal=document.createElement("div");

petal.className="petal";
petal.innerHTML="🌸";
petal.style.left=Math.random()*100+"vw";
petal.style.animationDuration=(5+Math.random()*5)+"s";

document.body.appendChild(petal);

setTimeout(()=>petal.remove(),10000);

},400);

/* TIMER */

const birthDate=new Date("March 12, 1998").getTime();

function updateTimer(){

const now=new Date().getTime();
const diff=now-birthDate;

const days=Math.floor(diff/(1000*60*60*24));
const hours=Math.floor((diff%(1000*60*60*24))/(1000*60*60));
const minutes=Math.floor((diff%(1000*60*60))/(1000*60));
const seconds=Math.floor((diff%(1000*60))/1000);

document.getElementById("timer").innerHTML=
"❤️ Jannu has been making the world beautiful for<br>"+
days+" days "+hours+" hours "+minutes+" minutes "+seconds+" seconds";

}

setInterval(updateTimer,1000);

/* TYPING MESSAGE */

const text=`Happy Birthday Jannu ❤️

Out of all the people in this world, I’m really thankful that life crossed our paths. You don’t even realize how much your presence means to me. Somehow, the smallest moments with you have become some of the most special ones in my life.

I just hope today reminds you how truly amazing you are. Stay the same beautiful soul, Jannu.`;

let i=0;

function typing(){

if(i<text.length){

document.getElementById("message").innerHTML+=text.charAt(i);

i++;

setTimeout(typing,35);

}

}

typing();

</script>

</body>
</html>
