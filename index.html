<!DOCTYPE html>
<html>
<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Happy Birthday Jannu ❤️</title>

<link rel="stylesheet" href="file/default.css">

<script src="file/jquery.min.js"></script>
<script src="file/jscex.min.js"></script>
<script src="file/jscex-parser.js"></script>
<script src="file/jscex-jit.js"></script>
<script src="file/jscex-builderbase.min.js"></script>
<script src="file/jscex-async.min.js"></script>
<script src="file/jscex-async-powerpack.min.js"></script>
<script src="file/functions.js"></script>
<script src="file/love.js"></script>

<style>

body{
margin:0;
background:linear-gradient(135deg,#ff6a88,#ff99ac);
font-family:Arial;
color:white;
text-align:center;
overflow-x:hidden;
}

/* INTRO */

#intro{
position:fixed;
width:100%;
height:100%;
background:#ff6a88;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:9999;
}

#openBtn{
padding:18px 35px;
font-size:20px;
background:white;
color:#ff4d6d;
border:none;
border-radius:10px;
cursor:pointer;
}

/* MAIN CONTAINER */

.container{
max-width:700px;
margin:auto;
padding:20px;
}

/* TITLE */

#glowTitle{
font-size:32px;
opacity:0;
text-shadow:0 0 10px white,0 0 20px #ff8fb1,0 0 40px #ff4d6d;
margin-bottom:20px;
}

/* PHOTO */

.photo{
width:150px;
height:150px;
border-radius:50%;
overflow:hidden;
margin:auto;
border:5px solid white;
animation:beat 1.2s infinite;
}

.photo img{
width:100%;
height:100%;
object-fit:cover;
}

@keyframes beat{
0%{transform:scale(1)}
50%{transform:scale(1.1)}
100%{transform:scale(1)}
}

/* MESSAGE */

#message{
font-size:16px;
line-height:1.6;
max-width:600px;
margin:20px auto;
}

/* SLIDESHOW */

.slideshow{
width:90%;
max-width:260px;
height:320px;
margin:auto;
position:relative;
}

.slide{
width:100%;
height:100%;
object-fit:cover;
position:absolute;
border-radius:12px;
opacity:0;
transition:1s;
}

.slide.active{
opacity:1;
}

/* TIMER */

#timer{
margin-top:20px;
font-size:16px;
}

/* PETALS */

.petal{
position:fixed;
top:-20px;
font-size:20px;
animation:fall linear infinite;
}

@keyframes fall{
to{
transform:translateY(100vh) rotate(360deg);
}
}

/* STARS */

.star{
position:fixed;
width:2px;
height:2px;
background:white;
animation:twinkle 3s infinite;
}

@keyframes twinkle{
0%{opacity:0}
50%{opacity:1}
100%{opacity:0}
}

/* TREE CANVAS */

#canvas{
position:fixed;
top:0;
left:50%;
transform:translateX(-50%);
z-index:-1;
}

/* MOBILE FIX */

@media(max-width:600px){

#glowTitle{
font-size:26px;
}

.photo{
width:130px;
height:130px;
}

.slideshow{
height:280px;
}

}

</style>

</head>

<body>

<div id="intro">

<h2>Tap to open your birthday surprise ❤️</h2>
<button id="openBtn">Open</button>

</div>

<audio id="music" loop>
<source src="aud.mp3">
</audio>

<div class="container">

<h1 id="glowTitle">🎉 Happy Birthday Jannu ❤️</h1>

<div class="photo">
<img src="jannu1.jpg">
</div>

<div id="message"></div>

<div style="font-size:40px">🎂</div>

<div class="slideshow">

<img class="slide" src="jannu1.jpg">
<img class="slide" src="jannu2.jpg">
<img class="slide" src="jannu3.jpg">
<img class="slide" src="jannu4.jpg">
<img class="slide" src="jannu5.jpg">
<img class="slide" src="jannu6.jpg">

</div>

<div id="timer"></div>

</div>

<canvas id="canvas" width="1100" height="680"></canvas>

<script>

/* STAR SKY */

for(let i=0;i<150;i++){

let star=document.createElement("div");
star.className="star";

star.style.left=Math.random()*100+"vw";
star.style.top=Math.random()*100+"vh";

document.body.appendChild(star);

}

/* OPEN */

document.getElementById("openBtn").onclick=function(){

document.getElementById("intro").style.display="none";

document.getElementById("music").play();

document.getElementById("glowTitle").style.opacity=1;

};

/* SLIDESHOW */

let slides=document.querySelectorAll(".slide");
let index=0;

function showSlides(){

slides.forEach(s=>s.classList.remove("active"));

slides[index].classList.add("active");

index++;

if(index>=slides.length) index=0;

}

showSlides();

setInterval(showSlides,3000);

/* PETALS */

setInterval(()=>{

let petal=document.createElement("div");

petal.className="petal";
petal.innerHTML="🌸";
petal.style.left=Math.random()*100+"vw";
petal.style.animationDuration=(5+Math.random()*5)+"s";

document.body.appendChild(petal);

setTimeout(()=>petal.remove(),10000);

},500);

/* TIMER */

const birthDate=new Date("March 12, 1998").getTime();

function updateTimer(){

const now=new Date().getTime();

const diff=now-birthDate;

const days=Math.floor(diff/(1000*60*60*24));
const hours=Math.floor((diff%(1000*60*60*24))/(1000*60*60));
const minutes=Math.floor((diff%(1000*60*60))/(1000*60));
const seconds=Math.floor((diff%(1000*60))/1000);

document.getElementById("timer").innerHTML=
"❤️ Jannu has been making the world beautiful for<br>"+
days+" days "+hours+" hours "+minutes+" minutes "+seconds+" seconds";

}

setInterval(updateTimer,1000);

/* TYPING MESSAGE */

const text=`Happy Birthday Jannu ❤️

Out of all the people in this world, I’m really thankful that life crossed our paths. You don’t even realize how much your presence means to me. Somehow, the smallest moments with you have become some of the most special ones in my life.

I just hope today reminds you how truly amazing you are. Stay the same beautiful soul, Jannu.`;

let i=0;

function typing(){

if(i<text.length){

document.getElementById("message").innerHTML+=text.charAt(i);

i++;

setTimeout(typing,35);

}

}

typing();

</script>

</body>
</html>
