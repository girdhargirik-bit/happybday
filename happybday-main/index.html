<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Jannu ❤️</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
text-align:center;
background:linear-gradient(135deg,#ff6a88,#ff99ac);
overflow-x:hidden;
color:white;
padding:20px;
}

/* INTRO SCREEN */

#intro{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:flex;
justify-content:center;
align-items:center;
color:white;
font-size:28px;
z-index:9999;
cursor:pointer;
text-align:center;
padding:20px;
}

/* TITLE */

h1{
font-size:42px;
margin-top:20px;
}

/* MESSAGE */

#message{
font-size:20px;
max-width:700px;
margin:20px auto;
line-height:1.6;
min-height:120px;
}

/* SLIDESHOW */

.slideshow{
width:260px;
height:320px;
margin:30px auto;
position:relative;
}

.slide{
width:100%;
height:100%;
object-fit:cover;
border-radius:15px;
position:absolute;
opacity:0;
transition:opacity 1s;
}

.slide.active{
opacity:1;
}

/* BALLOONS */

.balloon{
width:40px;
height:50px;
border-radius:50%;
position:absolute;
bottom:-60px;
animation:float 12s linear infinite;
}

.balloon:after{
content:'';
width:2px;
height:40px;
background:white;
position:absolute;
left:50%;
top:50px;
}

@keyframes float{
0%{transform:translateY(0);}
100%{transform:translateY(-120vh);}
}

/* CAKE */

.cake{
margin:40px auto;
width:150px;
height:90px;
background:#ffcc66;
border-radius:12px;
position:relative;
}

.candle{
width:10px;
height:35px;
background:white;
position:absolute;
top:-35px;
left:70px;
}

.flame{
width:12px;
height:12px;
background:orange;
border-radius:50%;
animation:flicker 0.5s infinite;
}

@keyframes flicker{
0%{transform:scale(1);}
50%{transform:scale(1.3);}
100%{transform:scale(1);}
}

/* CONFETTI */

.confetti{
position:absolute;
width:10px;
height:10px;
top:-10px;
animation:fall 5s linear infinite;
}

@keyframes fall{
to{transform:translateY(110vh) rotate(360deg);}
}

/* HEARTS */

.heart{
position:absolute;
font-size:20px;
animation:rise 6s linear infinite;
}

@keyframes rise{
0%{transform:translateY(0);opacity:1;}
100%{transform:translateY(-120vh);opacity:0;}
}

/* FIREWORKS */

@keyframes explode{
0%{transform:scale(1);opacity:1;}
100%{transform:scale(15);opacity:0;}
}

#timer{
margin-top:20px;
font-size:18px;
}

</style>
</head>

<body>

<div id="intro">Tap the screen for your surprise ❤️</div>

<h1>🎉 Happy Birthday Jannu ❤️</h1>

<div id="message"></div>

<div class="slideshow">

<img class="slide" src="jannu1.jpg">
<img class="slide" src="jannu2.jpg">
<img class="slide" src="jannu3.jpg">
<img class="slide" src="jannu4.jpg">
<img class="slide" src="jannu5.jpg">
<img class="slide" src="jannu6.jpg">

</div>

<div class="cake">
<div class="candle">
<div class="flame"></div>
</div>
</div>

<div id="timer"></div>

<audio autoplay loop>
<source src="aud.mp3" type="audio/mp3">
</audio>

<script>

/* SURPRISE FIREWORKS */

const intro=document.getElementById("intro");

intro.onclick=function(){

intro.style.display="none";

for(let i=0;i<40;i++){

let fire=document.createElement("div");

fire.style.position="fixed";
fire.style.width="6px";
fire.style.height="6px";
fire.style.background=`hsl(${Math.random()*360},100%,60%)`;
fire.style.left=Math.random()*100+"vw";
fire.style.top=Math.random()*100+"vh";
fire.style.borderRadius="50%";
fire.style.animation="explode 1s ease-out forwards";

document.body.appendChild(fire);

setTimeout(()=>fire.remove(),1000);

}

};

/* TYPING MESSAGE */

const text=`Out of all the people in this world, I’m really thankful that life crossed our paths. 
You don’t even realize how much your presence means to me. 
Somehow, the smallest moments with you have become some of the most special ones in my life.

I just hope today reminds you how truly amazing you are. 
Stay the same beautiful soul, Jannu. ❤️`;

let i=0;

function typing(){
if(i<text.length){
document.getElementById("message").innerHTML+=text.charAt(i);
i++;
setTimeout(typing,35);
}
}

typing();

/* PHOTO SLIDESHOW */

let slides=document.querySelectorAll(".slide");
let index=0;

function showSlides(){

slides.forEach(s=>s.classList.remove("active"));

slides[index].classList.add("active");

index++;

if(index>=slides.length){
index=0;
}

}

showSlides();
setInterval(showSlides,3000);

/* BALLOONS */

for(let i=0;i<25;i++){

let balloon=document.createElement("div");
balloon.className="balloon";
balloon.style.left=Math.random()*100+"vw";
balloon.style.background=`hsl(${Math.random()*360},70%,60%)`;
balloon.style.animationDuration=(7+Math.random()*5)+"s";

document.body.appendChild(balloon);

}

/* CONFETTI */

for(let i=0;i<70;i++){

let conf=document.createElement("div");
conf.className="confetti";
conf.style.left=Math.random()*100+"vw";
conf.style.animationDuration=(3+Math.random()*4)+"s";
conf.style.background=`hsl(${Math.random()*360},80%,60%)`;

document.body.appendChild(conf);

}

/* FLOATING HEARTS */

setInterval(()=>{

let heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="❤️";
heart.style.left=Math.random()*100+"vw";

document.body.appendChild(heart);

setTimeout(()=>heart.remove(),6000);

},400);

/* TIMER SINCE MARCH 12 */

const startDate=new Date("March 12, 2026 00:00:00").getTime();

function updateTimer(){

const now=new Date().getTime();
const diff=now-startDate;

const days=Math.floor(diff/(1000*60*60*24));
const hours=Math.floor((diff%(1000*60*60*24))/(1000*60*60));
const minutes=Math.floor((diff%(1000*60*60))/(1000*60));
const seconds=Math.floor((diff%(1000*60))/1000);

document.getElementById("timer").innerHTML=
"❤️ Time since this special day: "+
days+" days "+hours+" hours "+minutes+" minutes "+seconds+" seconds";

}

setInterval(updateTimer,1000);

</script>

</body>
</html>
